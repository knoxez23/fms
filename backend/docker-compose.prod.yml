services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: farmly-api:latest
    container_name: farmly-api-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/var/www/html
      - farmly_storage:/var/www/html/storage
      - farmly_bootstrap_cache:/var/www/html/bootstrap/cache

  nginx:
    image: nginx:1.27-alpine
    container_name: farmly-api-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  queue:
    image: farmly-api:latest
    container_name: farmly-api-queue
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["php", "artisan", "horizon"]
    volumes:
      - ./:/var/www/html
      - farmly_storage:/var/www/html/storage
      - farmly_bootstrap_cache:/var/www/html/bootstrap/cache

  scheduler:
    image: farmly-api:latest
    container_name: farmly-api-scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      - /bin/sh
      - -lc
      - while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done
    volumes:
      - ./:/var/www/html
      - farmly_storage:/var/www/html/storage
      - farmly_bootstrap_cache:/var/www/html/bootstrap/cache

  mysql:
    image: mysql:8.4
    container_name: farmly-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: farmly
      MYSQL_USER: farmly
      MYSQL_PASSWORD: change-me
      MYSQL_ROOT_PASSWORD: root-change-me
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot-change-me"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - farmly_mysql:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: farmly-api-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - farmly_redis:/data

volumes:
  farmly_mysql:
  farmly_redis:
  farmly_storage:
  farmly_bootstrap_cache:
