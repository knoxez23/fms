version: 0.0.1

environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.2.1
  shared_preferences: ^2.5.3

  provider: any
  lucide_icons_flutter: ^3.1.4
